<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perplexity</title>
    <link rel="icon" type="image/jpeg" href="/favicon.jpg?v=1">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>

    <div class="chat-container">
        <header>
            <h1>Sai.ai <span style="font-size: 0.8em; opacity: 0.6; font-weight: normal;">Llama 3</span></h1>
            <button id="clearBtn" class="clear-btn">Clear Chat</button>
        </header>

        <div id="chatHistory" class="chat-history">
            <!-- Dynamic Messages Only -->
        </div>

        <div class="input-area">
            <form id="chatForm">
                <input type="text" id="userInput" placeholder="Type your question here..." autocomplete="off" required>
                <button type="submit">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
